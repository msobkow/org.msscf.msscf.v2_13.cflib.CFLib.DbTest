#jakarta.persistence.jdbc.driver=org.postgresql.Driver
jakarta.persistence.jdbc.url=jdbc:postgresql://127.0.0.1:5432/secdb
jakarta.persistence.jdbc.user=postgres
jakarta.persistence.jdbc.password=pgpassword

hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.hbm2ddl.auto=update
hibernate.show_sql=true
hibernate.format_sql=true
hibernate.use_sql_comments=true
secdb.hibernate.default_schema=secdb

secdb.hikari.pool-name=SecDbHikariCP
hikari.maximum-pool-size=10
hikari.minimum-idle=2
