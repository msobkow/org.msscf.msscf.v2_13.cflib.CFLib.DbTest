# Hibernate JPA Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Application-specific properties
app.config.override-file=${user.home}/.cfdbtest.properties

# Disable default datasource auto-configuration
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Common JPA settings
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Security Database Configuration
secdb.datasource.driver-class-name=org.postgresql.Driver
secdb.datasource.jdbc-url=jdbc:postgresql://localhost:5432/secdb
secdb.datasource.username=secdb_user
secdb.datasource.password=secdb_password
secdb.datasource.hikari.schema=secdb
secdb.datasource.hikari.pool-name=SecDBHikariCP
secdb.datasource.hikari.maximum-pool-size=20
secdb.datasource.hikari.minimum-idle=5
secdb.datasource.hikari.connection-timeout=60000
secdb.datasource.hikari.idle-timeout=300000
secdb.datasource.hikari.max-lifetime=1800000
secdb.datasource.hikari.auto-commit=true

secdb.jpa.hibernate.ddl-auto=create
secdb.jpa.show-sql=true
secdb.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
secdb.sql.schema-location=classpath:db/secdb/schema.pgsql
secdb.sql.data-location=classpath:db/secdb/data.pgsql
secdb.sql.init-mode=always
secdb.sql.continue-on-error=true
