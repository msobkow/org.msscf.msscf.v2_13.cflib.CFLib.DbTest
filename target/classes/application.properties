# Hibernate JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Application-specific properties
app.config.override-file=${user.home}/.cfdbtest.properties

# Configuration for secdb
secdb.datasource.url=jdbc:postgresql://localhost:5432/secdb
secdb.datasource.username=secdb_user
secdb.datasource.password=secdb_password
secdb.datasource.driver-class-name=org.postgresql.Driver
secdb.datasource.jdbcurl=jdbc:postgresql://localhost:5432/secdb
secdb.datasource.schema=secdb
secdb.datasource.hikari.server-name=localhost
secdb.datasource.hikari.port=5432
secdb.datasource.hikari.minimum-idle=5
secdb.datasource.hikari.maximum-pool-size=20
secdb.datasource.hikari.idle-timeout=300000
secdb.datasource.hikari.max-lifetime=1800000
secdb.datasource.hikari.leak-detection-threshold=2000
secdb.datasource.hikari.connection-test-query=SELECT 1
secdb.datasource.hikari.auto-commit=true
secdb.datasource.hikari.pool-name=SecDBHikariCP
secdb.datasource.hikari.connection-timeout=60000
secdb.datasource.hikari.validation-timeout=10000
secdb.datasource.hikari.data-source-properties.prepStmtCacheSize=250
secdb.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
secdb.datasource.hikari.data-source-properties.useServerPrepStmts=true
secdb.datasource.hikari.data-source-properties.useLocalSessionState=true
secdb.datasource.hikari.data-source-properties.rewriteBatchedInserts=true
secdb.datasource.hikari.data-source-properties.cacheResultSetMetadata=true
secdb.datasource.hikari.data-source-properties.cacheServerConfiguration=true
secdb.datasource.hikari.data-source-properties.elideSetAutoCommits=true
secdb.datasource.hikari.data-source-properties.maintainTimeStats=false
secdb.datasource.hikari.data-source-properties.prepStmtCacheSize=250
secdb.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
secdb.datasource.hikari.data-source-properties.useLocalTransactionState=true
secdb.datasource.hikari.data-source-properties.useUnbufferedIo=true
secdb.datasource.hikari.data-source-properties.cachePrepStmts=true
secdb.datasource.hikari.data-source-properties.prepStmtCacheSize=250
secdb.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
secdb.datasource.hikari.data-source-properties.useServerPrepStmts=true


